version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: jaguars-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: jaguars-cricket
    volumes:
      - mongodb-data:/data/db
    networks:
      - jaguars-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jaguars-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/jaguars-cricket
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - jaguars-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jaguars-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - jaguars-network
    restart: unless-stopped

volumes:
  mongodb-data:

networks:
  jaguars-network:
    driver: bridge
